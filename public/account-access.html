<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Access Coming Soon</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ecfdf5, #f8fafc);
        color: #0f172a;
      }
      .card {
        width: min(92%, 620px);
        padding: 48px;
        text-align: center;
        border-radius: 28px;
        background: white;
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.14);
        border: 1px solid #d1fae5;
      }
      .logo {
        display: inline-flex;
        gap: 6px;
        margin-bottom: 24px;
        padding: 12px 18px;
        border-radius: 18px;
        background: #ffffff;
        border: 1px solid #d1fae5;
        font-weight: 900;
        font-size: 22px;
      }
      .logo span:nth-child(2) {
        color: #10b981;
      }
      h1 {
        margin: 0;
        font-size: clamp(32px, 5vw, 52px);
      }
      p {
        margin: 18px auto 0;
        max-width: 480px;
        color: #475569;
        font-size: 18px;
        line-height: 1.7;
      }
      a {
        display: inline-flex;
        margin-top: 30px;
        padding: 14px 24px;
        border-radius: 14px;
        background: #10b981;
        color: white;
        text-decoration: none;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="logo">
        <span>Stellar</span>
        <span>Groupware</span>
        <span>Inc.</span>
      </div>
      <h1>Student access coming soon</h1>
      <p>We are preparing the student portal. Please check back soon or contact support for help with your training access.</p>
      <a href="mailto:info@stellartms.com">Contact Support</a>
    </main>
  </body>
</html>
